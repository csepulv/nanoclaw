<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NanoClaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #header {
    padding: 12px 16px;
    background: #16213e;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #header h1 { font-size: 16px; font-weight: 600; }

  #status { font-size: 12px; color: #888; }
  #status.connected { color: #4ade80; }
  #status.disconnected { color: #f87171; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: 14px;
    line-height: 1.5;
  }

  .msg.user {
    align-self: flex-end;
    background: #3b82f6;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: #2a2a4a;
    color: #e0e0e0;
    border-bottom-left-radius: 4px;
  }

  #typing {
    padding: 0 16px 8px;
    font-size: 13px;
    color: #888;
    min-height: 24px;
  }

  .typing-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  #input-bar {
    padding: 12px 16px;
    background: #16213e;
    border-top: 1px solid #2a2a4a;
    display: flex;
    gap: 8px;
  }

  #input {
    flex: 1;
    padding: 10px 14px;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 40px;
    max-height: 120px;
  }

  #input:focus { border-color: #3b82f6; }

  #send {
    padding: 10px 20px;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    align-self: flex-end;
  }

  #send:hover { background: #2563eb; }
  #send:disabled { background: #555; cursor: not-allowed; }
</style>
</head>
<body>

<div id="header">
  <h1>NanoClaw</h1>
  <span id="status" class="disconnected">disconnected</span>
</div>

<div id="messages"></div>
<div id="typing"></div>

<div id="input-bar">
  <textarea id="input" rows="1" placeholder="Type a message..." autofocus></textarea>
  <button id="send">Send</button>
</div>

<script>
(function() {
  var messagesEl = document.getElementById('messages');
  var typingEl = document.getElementById('typing');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('send');
  var statusEl = document.getElementById('status');

  var ws = null;
  var reconnectDelay = 1000;
  var MAX_RECONNECT_DELAY = 30000;

  function connect() {
    var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(protocol + '//' + location.host + '/ws');

    ws.onopen = function() {
      statusEl.textContent = 'connected';
      statusEl.className = 'connected';
      reconnectDelay = 1000;
      sendBtn.disabled = false;
    };

    ws.onclose = function() {
      statusEl.textContent = 'disconnected';
      statusEl.className = 'disconnected';
      sendBtn.disabled = true;
      ws = null;
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
    };

    ws.onerror = function() {};

    ws.onmessage = function(event) {
      var msg = JSON.parse(event.data);
      if (msg.type === 'message') {
        appendMessage('assistant', msg.text);
        setTypingIndicator(false);
      } else if (msg.type === 'typing') {
        setTypingIndicator(msg.isTyping);
      }
    };
  }

  function appendMessage(role, text) {
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setTypingIndicator(isTyping) {
    while (typingEl.firstChild) {
      typingEl.removeChild(typingEl.firstChild);
    }
    if (isTyping) {
      var span = document.createElement('span');
      span.className = 'typing-dots';
      span.textContent = 'Thinking';
      typingEl.appendChild(span);
    }
  }

  function sendMessage() {
    var text = inputEl.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    appendMessage('user', text);
    ws.send(JSON.stringify({ type: 'message', text: text }));
    inputEl.value = '';
    inputEl.style.height = 'auto';
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  connect();
})();
</script>
</body>
</html>
